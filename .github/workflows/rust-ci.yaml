name: Rust-CI

# Parallel to ocaml-ci.yaml / purescript-ci.yaml (ADR-0057 gate topology), applied to the Rust
# runtime crate under `runtime/` (ADR-0063/0064). The workflow always triggers (no top-level
# `paths-ignore`) so that the required `rust-ci-gate` status check is *always* produced â€” otherwise a
# PR touching only the OCaml/PureScript/docs side would skip the workflow, never report
# `rust-ci-gate`, and branch protection would leave the PR unmergeable. The expensive Nix build is
# gated on whether the Rust surface actually changed, so a change elsewhere still skips the heavy
# build but the gate goes green.
on:
  push:
    branches:
      - "**"
  pull_request:

# Cancel a superseded run when new commits land on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether the heavy build needs to run: true iff something on the Rust surface changed.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'runtime/**'
              - 'flake.nix'
              - 'flake.lock'
              - '.github/workflows/rust-ci.yaml'

  ci:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      # Setup Nix environment â€” identical to ocaml-ci.yaml / purescript-ci.yaml so the toolchain
      # (rustc, cargo, rustfmt, clippy) comes from flake.nix + flake.lock as the single source of
      # truth.
      - uses: actions/checkout@v5
      # v30 ships Nix >= 2.18, required by the pinned nixos-25.11 nixpkgs.
      - uses: cachix/install-nix-action@v30
        with:
          # No nixpkgs channel pin here: the toolchain comes from `nix develop`,
          # so flake.nix + flake.lock are the single source of truth.
          extra_nix_config: experimental-features = nix-command flakes
      - uses: cachix/cachix-action@v17
        with:
          name: katsujukou-github
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      # Loads the `nix develop` environment (rustc, cargo, rustfmt, clippy, â€¦) into PATH for every
      # `run:` step below.
      - uses: nicknovitski/nix-develop@v1

      # Build, test, format-check, and lint the runtime crate under runtime/.
      - name: Build
        run: cargo build
        working-directory: runtime

      # `cargo test` runs in debug, so the `#[cfg(debug_assertions)]` invariant tests (size-0 header,
      # invalid code point, 63-bit overflow) are exercised.
      - name: Test
        run: cargo test
        working-directory: runtime

      # Fails if any file is not rustfmt-clean. The OCaml `dune build @fmt` / PureScript `purs-tidy
      # check` equivalent.
      - name: Format check
        run: cargo fmt --all -- --check
        working-directory: runtime

      # Deny all clippy warnings â€” the unsafe-heavy runtime is held to a clean lint bar from the start.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: runtime

  # Miri interprets the unsafe GC island for Undefined Behaviour (ADR-0063 Â§4) â€” out-of-bounds,
  # use-after-free, invalid transmutes, aliasing (Stacked Borrows). A separate job from `ci` because
  # it needs the nightly `.#miri` devShell (nixpkgs stable `rustc` ships no `miri`), and runs in
  # parallel with build/test/clippy so it does not serialise behind them.
  miri:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: experimental-features = nix-command flakes
      # Caches the nightly toolchain derivations (oxalica/rust-overlay) so only the first run builds
      # them; the `cargo miri setup` checked-sysroot compile still runs each time (a cargo artifact,
      # not a nix store path).
      - uses: cachix/cachix-action@v17
        with:
          name: katsujukou-github
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      # Runs in the `.#miri` shell (nightly + miri), NOT the default stable shell, so it is invoked
      # directly rather than via nicknovitski/nix-develop. `nix develop` resolves the flake at the
      # repo root, so `cd runtime` happens inside the command. Default (permissive/exposed) provenance
      # is intentional: the tagged-word ABI does intâ†”pointer casts, which `-Zmiri-strict-provenance`
      # would flag as false failures; default Miri still catches genuine UB.
      - name: Miri (unsafe GC island â€” ADR-0063 Â§4)
        run: nix develop .#miri --command sh -c 'cd runtime && cargo miri test'

  # The single required status check. Always runs; green when `ci` + `miri` passed OR were skipped
  # (Rust surface untouched), red when either failed or was cancelled. Point branch protection at THIS
  # job (`rust-ci-gate`), alongside OCaml-CI's `ci-gate` and PureScript-CI's `ps-ci-gate`.
  rust-ci-gate:
    needs: [ci, miri]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate on the ci + miri results
        run: |
          ci='${{ needs.ci.result }}'
          miri='${{ needs.miri.result }}'
          for r in "$ci" "$miri"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::Rust CI did not pass (ci=$ci miri=$miri)"
              exit 1
            fi
          done
          echo "Rust CI gate green (ci=$ci miri=$miri)"
